<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>داشبورد مدیریت سامی‌واتر</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background: #021f18; color: #fff; font-family: Tahoma; padding: 20px; }
    .card { background: #042e24; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #2a5e4e; }
    .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: rgba(4, 38, 30, 0.4); }
    .data-table th, .data-table td { border: 1px solid #2a5e4e; padding: 12px; text-align: center; }
    .data-table th { color: #ffd700; }
  </style>
</head>
<body>
  <h1>🏆 پنل مدیریت ارشد</h1>
  
  <h2>📋 بانک درخواست‌ها</h2>
  <table class="data-table">
    <thead>
      <tr><th>مشتری</th><th>شماره</th><th>سرویس</th><th>وضعیت</th></tr>
    </thead>
    <tbody id="req-body">
      <tr><td colspan="4">در حال دریافت...</td></tr>
    </tbody>
  </table>

  <script>
    const API = "https://samiwater-backend.onrender.com";
    
    window.onload = async () => {
        // دریافت درخواست‌ها
        const res = await fetch(`${API}/api/service-requests`);
        const data = await res.json();
        const body = document.getElementById('req-body');
        
        if (data.requests && data.requests.length > 0) {
            body.innerHTML = data.requests.map(r => `
                <tr class="card">
                    <td>${r.snapshot.fullName}</td>
                    <td>${r.snapshot.phone}</td>
                    <td>${r.issueType}</td>
                    <td>${r.status}</td>
                </tr>
            `).join('');
        } else {
            body.innerHTML = '<tr><td colspan="4">درخواستی ثبت نشده</td></tr>';
        }
    };
  </script>
</body>
</html>
