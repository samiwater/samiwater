<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>فرم ثبت مشتری | SamiWater</title>
  <style>
    body{background:#083b31;color:#f7f7f7;font-family:Tahoma, sans-serif}
    .card{max-width:680px;margin:28px auto;padding:22px;border:1px solid #335f55;border-radius:18px;background:#0e4a3f}
    .input{width:100%;padding:12px;border-radius:12px;border:1px solid #2f5c51;background:#f3f7f6;color:#072b24;margin-bottom:10px}
    .btn{width:100%;padding:14px;border-radius:14px;background:#f3c842;color:#10352c;font-weight:800;font-size:18px;border:none}
  </style>
</head>
<body>
  <div class="card">
    <h2>ثبت مشخصات مشتری</h2>
    <input id="phone" class="input" readonly />
    <input id="fullName" class="input" placeholder="نام و نام‌خانوادگی" />
    <input id="city" class="input" value="اصفهان" />
    <input id="altPhone" class="input" placeholder="تلفن دوم (اختیاری)" />
    <textarea id="address" class="input" placeholder="آدرس دقیق"></textarea>
    <button id="submitBtn" class="btn">ثبت نهایی</button>
  </div>

  <script>
    const API = "https://samiwater-backend.onrender.com";
    document.getElementById("phone").value = new URLSearchParams(location.search).get("phone") || "";

    document.getElementById("submitBtn").addEventListener("click", async () => {
      const body = {
        fullName: document.getElementById("fullName").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        address: document.getElementById("address").value.trim(),
        altPhone: document.getElementById("altPhone").value.trim(),
        city: document.getElementById("city").value.trim()
      };

      if(!body.fullName || !body.address) return alert("نام و آدرس الزامی است");

      try {
        // ۱. ثبت مشتری در دیتابیس
        const res = await fetch(`${API}/api/customers`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(body)
        });
        
        const data = await res.json();
        
        if (res.ok) {
          alert("ثبت با موفقیت انجام شد.");
          location.href = "request-confirmed.html";
        } else {
          alert("خطا: " + (data.error || "مشکلی پیش آمد"));
        }
      } catch(e) { 
        alert("خطای شبکه: " + e.message); 
      }
    });
  </script>
</body>
</html>
