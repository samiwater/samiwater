<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ثبت نهایی | SamiWater</title>
  <!-- لینکِ فایلِ استایلِ اصلیِ پروژه‌ت -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h2>ثبت مشخصات مشتری</h2>
    
    <label>شماره موبایل</label>
    <input id="phone" class="input" readonly />
    
    <label>نام و نام‌خانوادگی</label>
    <input id="fullName" class="input" placeholder="نام و نام‌خانوادگی خود را وارد کنید" />
    
    <label>آدرس دقیق</label>
    <input id="address" class="input" placeholder="آدرس دقیق محل سکونت" />
    
    <label>توضیحات (اختیاری)</label>
    <input id="notes" class="input" placeholder="مثلاً: ظهرها زنگ نزنید" />

    <button id="submitBtn" class="btn">ثبت نهایی و ارسال درخواست</button>
  </div>

  <script>
    const API = "https://samiwater-backend.onrender.com";
    const phone = new URLSearchParams(location.search).get("phone");
    document.getElementById("phone").value = phone;

    // ۱. چک کردن بانک به محض لود شدن
    window.onload = async () => {
      try {
        const res = await fetch(`${API}/api/customers`);
        const data = await res.json();
        const existing = data.customers.find(c => c.phone === phone);
        
        if (existing) {
          document.getElementById("fullName").value = existing.fullName;
          if (existing.addresses.length > 0) {
            document.getElementById("address").value = existing.addresses[0].fullAddress;
          }
          if (existing.notes) {
            document.getElementById("notes").value = existing.notes;
          }
        }
      } catch (e) { console.log("خطا در ارتباط با بانک اطلاعاتی"); }
    };

    // ۲. ثبت یا آپدیت
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const data = {
        phone,
        fullName: document.getElementById("fullName").value,
        address: document.getElementById("address").value,
        notes: document.getElementById("notes").value
      };

      try {
        const res = await fetch(`${API}/api/customers`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          location.href = "request-confirmed.html";
        } else {
          alert("خطا در ثبت اطلاعات");
        }
      } catch(e) { alert("خطا در شبکه"); }
    });
  </script>
</body>
</html>
