<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>ثبت نهایی | SamiWater</title>
  <style>
    body{background:#083b31;color:#fff;font-family:Tahoma}
    .card{max-width:500px;margin:20px auto;padding:20px;background:#0e4a3f;border-radius:15px}
    .input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none}
    label{font-size:14px;color:#f3c842}
    .btn{width:100%;padding:12px;background:#f3c842;border:none;border-radius:8px;font-weight:bold}
  </style>
</head>
<body>
  <div class="card">
    <h2>ثبت مشخصات</h2>
    <label>شماره موبایل</label>
    <input id="phone" class="input" readonly />
    
    <label>نام و نام‌خانوادگی</label>
    <input id="fullName" class="input" placeholder="مثال: محمد نکهی" />
    
    <label>آدرس دقیق</label>
    <input id="address" class="input" placeholder="مثال: خیابان تختی، پلاک ۱۰" />
    
    <label>توضیحات (اختیاری)</label>
    <input id="notes" class="input" placeholder="مثال: ظهر زنگ نزنید" />

    <button id="submitBtn" class="btn">ثبت نهایی و ارسال درخواست</button>
  </div>

  <script>
    const API = "https://samiwater-backend.onrender.com";
    const phone = new URLSearchParams(location.search).get("phone");
    document.getElementById("phone").value = phone;

    document.getElementById("submitBtn").addEventListener("click", async () => {
      const data = {
        phone,
        fullName: document.getElementById("fullName").value,
        address: document.getElementById("address").value,
        notes: document.getElementById("notes").value
      };

      try {
        // ۱. ثبت/آپدیت مشتری در بک‌اَند
        const res = await fetch(`${API}/api/customers`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          // ۲. هدایت به صفحه تایید (بدونِ ارسالِ آیدی، چون بک‌اَند خودش آدرس رو مدیریت کرد)
          location.href = "request-confirmed.html";
        } else {
          alert("خطا در ثبت اطلاعات");
        }
      } catch(e) { alert("خطا: " + e.message); }
    });
  </script>
</body>
</html>
