<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت سامی‌واتر</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Tahoma, sans-serif; }
        body { background: #f1f5f9; color: #1e293b; padding: 20px; }
        .header { background: #1e293b; color: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { font-size: 18px; }
        .nav-menu { display: flex; gap: 15px; }
        .nav-menu a { color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: bold; }
        .nav-menu a:hover { color: #fff; }
        .logout-btn { background: #ef4444; border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #cbd5e1; padding: 12px; text-align: right; font-size: 14px; }
        th { background: #f8fafc; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-done { background: #dcfce7; color: #15803d; }
        .status-open { background: #e0f2fe; color: #0369a1; }
        .action-select { padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; cursor: pointer; }
        .error-msg { color: #ef4444; background: #fee2e2; padding: 10px; border-radius: 6px; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1>پنل مدیریت سامی‌واتر</h1>
    <nav class="nav-menu">
        <a href="customers.html">بانک اطلاعات</a>
        <a href="services.html">بانک خدمات</a>
        <a href="users.html">مدیریت کاربران</a>
    </nav>
    <button class="logout-btn" onclick="logout()">خروج</button>
</div>

<div id="errBox" class="error-msg"></div>

<div class="card">
    <h2>لیست درخواست‌ها</h2>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>کد فاکتور</th>
                    <th>نام مشتری</th>
                    <th>شماره تماس</th>
                    <th>نوع خدمت</th>
                    <th>وضعیت</th>
                    <th>عملیات</th>
                </tr>
            </thead>
            <tbody id="requestsTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const API_BASE = "https://samiwater-backend.onrender.com/api";

    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "login.html";
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }

    async function loadRequests() {
        try {
            const res = await fetch(`${API_BASE}/requests`, {
                method: "GET",
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await res.json();
            
            if (!res.ok) throw new Error(data.error || "خطا در دریافت اطلاعات");

            const tbody = document.getElementById("requestsTableBody");
            tbody.innerHTML = "";

            data.requests.forEach(req => {
                const tr = document.createElement("tr");
                const clientName = req.snapshot?.fullName || "نامشخص";
                const clientPhone = req.snapshot?.phone || "نامشخص";
                
                let statusClass = "status-pending", statusText = "در انتظار";
                if(req.status === "done" || req.status === "completed") { statusClass = "status-done"; statusText = "انجام شده"; }
                if(req.status === "open") { statusClass = "status-open"; statusText = "فاکتور باز"; }

                tr.innerHTML = `
                    <td>${req.invoiceCode || '---'}</td>
                    <td>${clientName}</td>
                    <td>${clientPhone}</td>
                    <td>${req.issueType || 'سرویس'}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <select class="action-select" onchange="updateStatus('${req._id}', this.value)">
                            <option value="open" ${req.status === 'open' ? 'selected' : ''}>فاکتور باز</option>
                            <option value="done" ${req.status === 'done' ? 'selected' : ''}>انجام شده</option>
                            <option value="pending" ${req.status === 'pending' ? 'selected' : ''}>در انتظار</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            const errBox = document.getElementById("errBox");
            errBox.innerText = e.message;
            errBox.style.display = "block";
        }
    }

    async function updateStatus(id, newStatus) {
        try {
            await fetch(`${API_BASE}/requests/${id}/status`, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({ status: newStatus })
            });
            loadRequests();
        } catch (e) { alert("خطا در به‌روزرسانی وضعیت"); }
    }

    window.onload = loadRequests;
</script>
</body>
</html>
