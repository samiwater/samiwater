<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>باشگاه مشتریان | SamiWater</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body{background:#0e3b2f;color:#fff;font-family:sans-serif}
    .card{max-width:560px;margin:28px auto;background:#0f3f33;border:1px solid #19533f;border-radius:18px;padding:24px;box-shadow:0 8px 30px rgba(0,0,0,.25)}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .badge{width:48px;height:48px;border-radius:14px;background:#113d32;display:flex;align-items:center;justify-content:center;border:1px solid #2a644e}
    h1{margin:0;font-size:26px;color:#f5cc52}
    label{display:block;margin:14px 0 6px}
    input{width:100%;height:52px;border-radius:14px;border:1px solid #2a644e;background:#eaf3ef;color:#07241c;padding:0 14px;font-size:18px}
    .btn{width:100%;height:56px;border-radius:16px;background:#f2c846;border:none;font-size:20px;margin-top:18px;cursor:pointer;font-weight:bold;color:#0e3b2f;}
    .btn:hover{background:#e2ba3a}
    .muted{opacity:.9;margin-top:18px;line-height:1.8;font-size:14px;color:#cbdcd6}
    .status-msg { margin-top: 15px; font-weight: bold; text-align: center; font-size: 16px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="badge">SA</div>
      <h1>باشگاه مشتریان | SamiWater</h1>
    </div>

    <div id="phoneWrap">
      <label>شماره موبایل</label>
      <input id="phone" placeholder="مثلاً 09131234567" inputmode="tel" maxlength="11" />
    </div>

    <div id="otpWrap" style="display:none">
      <label style="color:#f2c846">کد تایید پیامک شده</label>
      <input id="otpCode" placeholder="کد تایید را وارد کنید" inputmode="numeric" maxlength="6" />
    </div>

    <button class="btn" id="goBtn">ادامه</button>

    <div class="status-msg" id="statusBox"></div>

    <div class="muted" id="descText">
      جهت ورود به باشگاه مشتریان سامی‌و‌تر و مشاهده آنی سوابق فیلترها، خدمات دریافت شده، نام تکنسین و هزینه‌ها، شماره موبایل خود را وارد نمایید.
    </div>
  </div>

<script>
  const BACKEND_URL = "https://samiwater-backend.onrender.com";
  let step = 1;

  const phoneEl = document.getElementById('phone');
  const otpWrap = document.getElementById('otpWrap');
  const otpCodeEl = document.getElementById('otpCode');
  const goBtn   = document.getElementById('goBtn');
  const descText = document.getElementById('descText');
  const statusBox = document.getElementById('statusBox');

  goBtn.addEventListener('click', async () => {
    const ph = phoneEl.value.trim();
    statusBox.style.display = 'none';

    if (step === 1) {
      if (!/^09\d{9}$/.test(ph)) {
        showStatus('لطفاً شماره موبایل معتبر وارد کنید', '#ff6b6b');
        return;
      }

      try {
        const response = await fetch(`${BACKEND_URL}/api/auth/request-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: ph })
        });
        const data = await response.json();

        if (data.ok) {
          step = 2;
          otpWrap.style.display = 'block';
          phoneEl.disabled = true;
          goBtn.innerText = "تایید و ورود";
          descText.innerText = "کد تایید با موفقیت صادر شد. آن را در کادر بالا وارد کنید تا وارد سوابق خود شوید.";
          showStatus("کد تایید صادر شد (کد تست شما: " + data.dev_code + ")", '#6bffb4');
        } else {
          showStatus(data.error || "خطا در ارسال کد", '#ff6b6b');
        }
      } catch (err) {
        showStatus("خطا در ارتباط با سرور بک‌اَند!", '#ff6b6b');
      }

    } else {
      const code = otpCodeEl.value.trim();
      if (!code) { showStatus('لطفاً کد تایید را وارد کنید', '#ff6b6b'); return; }

      try {
        const response = await fetch(`${BACKEND_URL}/api/auth/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: ph, code: code })
        });
        const data = await response.json();

        if (data.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('role', 'customer');
          localStorage.setItem('customerPhone', ph);
          
          // هدایت مشتری به صفحه سوابق
          window.location.href = 'profile.html';
        } else {
          showStatus(data.error || "کد تایید اشتباه است", '#ff6b6b');
        }
      } catch (err) {
        showStatus("خطا در تایید کد ورود!", '#ff6b6b');
      }
    }
  });

  function showStatus(msg, color) {
    statusBox.innerText = msg;
    statusBox.style.color = color;
    statusBox.style.display = 'block';
  }
</script>
</body>
</html>
