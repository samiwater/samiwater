<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>SamiWater App | صفحه اصلی</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #042e24; /* رنگ هم‌خوان با بک‌گراند */
      height: 100%;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 600px;
      aspect-ratio: 9 / 16;
      margin: auto;
      background-image: url('landing-main.png'); /* عکس اصلی اپلیکیشن شما */
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      height: 100%;
    }

    /* دکمه نامرئی روی منوی همبرگری (بالا سمت راست عکس) */
    #menu-trigger-btn {
      position: absolute;
      top: 3.5%;
      right: 5%;
      width: 12%;
      height: 6%;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* ظاهر منوی کشویی همبرگری بعد از کلیک */
    .overlay-menu {
      position: absolute;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100%;
      background: rgba(4, 38, 30, 0.97); /* سبز تیره مات لوکس */
      z-index: 20;
      transition: 0.4s ease;
      display: flex;
      flex-direction: column;
      padding: 40px 30px;
      box-sizing: border-box;
    }

    .overlay-menu.active {
      right: 0;
    }

    .close-btn {
      align-self: flex-start;
      font-size: 40px;
      color: #ffd700;
      cursor: pointer;
      margin-bottom: 40px;
      user-select: none;
    }

    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .menu-links a {
      color: #fff;
      text-decoration: none;
      font-size: 22px;
      font-weight: bold;
      padding: 12px;
      border-bottom: 1px solid #144235;
      transition: 0.3s;
      text-align: right;
    }

    .menu-links a:hover {
      color: #ffd700;
      padding-right: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- دکمه نامرئی که دقیقاً می‌افتد روی شکل همبرگریِ عکس -->
    <button id="menu-trigger-btn" onclick="toggleMenu()"></button>

    <!-- منوی مخفی که با کلیک روی دکمه بالا باز می‌شود -->
    <div class="overlay-menu" id="hamburgerMenu">
      <div class="close-btn" onclick="toggleMenu()">×</div>
      <div class="menu-links">
        <a href="services.html">🛠️ درخواست خدمات و تعمیرات</a>
        <a href="club.html">🏆 باشگاه مشتریان</a>
        <a href="consult.html">💬 مشاوره رایگان</a>
        <a href="login.html">🔐 ورود مدیریت</a>
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("hamburgerMenu");
      menu.classList.toggle("active");
    }
  </script>

</body>
</html>
