<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>SamiWater App | صفحه اصلی</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #042e24; /* رنگ سبز تیره پس‌زمینه برای هماهنگی کامل حاشیه‌ها */
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* باکس اصلی که دقیقاً ابعاد عکس را حفظ می‌کند */
    .app-wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* تصویر اصلی بدون ذره‌ای زوم یا برش */
    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    /* --- دکمه‌های نامرئی کاملاً تنظیم شده بر اساس ابعاد واقعی تصویر --- */

    /* منوی همبرگری (دقیقا روی سه خط طلایی) */
    #menu-trigger-btn {
      position: absolute;
      top: 14%; 
      right: 5%;
      width: 15%;
      height: 5%;
      background: rgba(255, 0, 0, 0); 
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* شماره تلفن اول (09130051733) */
    .call-btn-1 {
      position: absolute;
      top: 57.5%; 
      left: 15%;
      width: 70%;
      height: 4.5%;
      background: rgba(0, 255, 0, 0);
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* شماره تلفن دوم (09130051745) */
    .call-btn-2 {
      position: absolute;
      top: 64.5%; 
      left: 15%;
      width: 70%;
      height: 4.5%;
      background: rgba(0, 0, 255, 0);
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* آیدی اینستاگرام (samiwater.vip) - یک میل کشیده شد بالاتر برای مچ شدن کامل */
    .insta-btn {
      position: absolute;
      top: 70.2%; 
      left: 15%;
      width: 70%;
      height: 4.5%;
      background: rgba(255, 255, 0, 0);
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* ظاهر منوی کشویی همبرگری */
    .overlay-menu {
      position: absolute;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100%;
      background: rgba(4, 38, 30, 0.98);
      z-index: 20;
      transition: 0.4s ease;
      display: flex;
      flex-direction: column;
      padding: 40px 30px;
      box-sizing: border-box;
    }

    .overlay-menu.active {
      right: 0;
    }

    .close-btn {
      align-self: flex-start;
      font-size: 40px;
      color: #ffd700;
      cursor: pointer;
      margin-bottom: 40px;
      user-select: none;
    }

    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .menu-links a {
      color: #fff;
      text-decoration: none;
      font-size: 22px;
      font-weight: bold;
      padding: 12px;
      border-bottom: 1px solid #144235;
      transition: 0.3s;
      text-align: right;
    }

    .menu-links a:hover {
      color: #ffd700;
      padding-right: 10px;
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <!-- تصویر اصلی -->
    <img src="landing-main.png" alt="SamiWater" class="bg-image">

    <!-- دکمه منو -->
    <button id="menu-trigger-btn" onclick="toggleMenu()"></button>

    <!-- دکمه‌های تماس و اینستاگرام با تراز نهایی -->
    <button class="call-btn-1" onclick="location.href='tel:09130051733'"></button>
    <button class="call-btn-2" onclick="location.href='tel:09130051745'"></button>
    <button class="insta-btn" onclick="window.open('https://instagram.com/samiwater.vip', '_blank')"></button>

    <!-- منوی همبرگری بازشونده -->
    <div class="overlay-menu" id="hamburgerMenu">
      <div class="close-btn" onclick="toggleMenu()">×</div>
      <div class="menu-links">
        <a href="services.html">🛠️ درخواست خدمات و تعمیرات</a>
        <a href="club.html">🏆 باشگاه مشتریان</a>
        <a href="consult.html">💬 مشاوره رایگان</a>
        <a href="login.html">🔐 ورود مدیریت</a>
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("hamburgerMenu");
      menu.classList.toggle("active");
    }
  </script>

</body>
</html>
