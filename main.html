<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>SamiWater App | صفحه اصلی</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #042e24;
      height: 100%;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 600px;
      height: 100vh;
      margin: auto;
      /* تغییر به cover برای پر کردن کامل بالا و پایین صفحه */
      background-image: url('landing-main.png'); 
      background-size: cover; 
      background-repeat: no-repeat;
      background-position: center;
    }

    /* دکمه نامرئی روی منوی همبرگری - با تنظیم دقیق درصد بر اساس عکس cover */
    #menu-trigger-btn {
      position: absolute;
      top: 19.5%; /* اصلاح درصد برای نشستن دقیق روی سه خط طلایی */
      right: 7%;
      width: 12%;
      height: 4%;
      background: rgba(255, 0, 0, 0); /* کاملاً نامرئی */
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* دکمه نامرئی برای شماره تلفن اول */
    .call-btn-1 {
      position: absolute;
      top: 60.5%;
      left: 20%;
      width: 60%;
      height: 4%;
      background: rgba(0, 0, 0, 0);
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* دکمه نامرئی برای شماره تلفن دوم */
    .call-btn-2 {
      position: absolute;
      top: 65.5%;
      left: 20%;
      width: 60%;
      height: 4%;
      background: rgba(0, 0, 0, 0);
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* دکمه نامرئی برای آیدی اینستاگرام */
    .insta-btn {
      position: absolute;
      top: 71%;
      left: 20%;
      width: 60%;
      height: 4%;
      background: rgba(0, 0, 0, 0);
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* ظاهر منوی کشویی همبرگری */
    .overlay-menu {
      position: absolute;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100%;
      background: rgba(4, 38, 30, 0.98);
      z-index: 20;
      transition: 0.4s ease;
      display: flex;
      flex-direction: column;
      padding: 40px 30px;
      box-sizing: border-box;
    }

    .overlay-menu.active {
      right: 0;
    }

    .close-btn {
      align-self: flex-start;
      font-size: 40px;
      color: #ffd700;
      cursor: pointer;
      margin-bottom: 40px;
      user-select: none;
    }

    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .menu-links a {
      color: #fff;
      text-decoration: none;
      font-size: 22px;
      font-weight: bold;
      padding: 12px;
      border-bottom: 1px solid #144235;
      transition: 0.3s;
      text-align: right;
    }

    .menu-links a:hover {
      color: #ffd700;
      padding-right: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- دکمه منو -->
    <button id="menu-trigger-btn" onclick="toggleMenu()"></button>

    <!-- دکمه‌های تماس و اینستاگرام زنده روی عکس -->
    <button class="call-btn-1" onclick="location.href='tel:09130051733'"></button>
    <button class="call-btn-2" onclick="location.href='tel:09130051745'"></button>
    <button class="insta-btn" onclick="window.open('https://instagram.com/samiwater.vip', '_blank')"></button>

    <!-- منوی همبرگری بازشونده -->
    <div class="overlay-menu" id="hamburgerMenu">
      <div class="close-btn" onclick="toggleMenu()">×</div>
      <div class="menu-links">
        <a href="services.html">🛠️ درخواست خدمات و تعمیرات</a>
        <a href="club.html">🏆 باشگاه مشتریان</a>
        <a href="consult.html">💬 مشاوره رایگان</a>
        <a href="login.html">🔐 ورود مدیریت</a>
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("hamburgerMenu");
      menu.classList.toggle("active");
    }
  </script>

</body>
</html>
